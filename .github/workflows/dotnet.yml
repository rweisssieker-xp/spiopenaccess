name: .NET

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore SpiOpenAccess.sln

      - name: Build
        run: dotnet build SpiOpenAccess.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SpiOpenAccess.sln --configuration Release --no-build
